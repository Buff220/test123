<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Camera Overlay (Fixed)</title>

<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: black;
}

#ui {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 10px;
    font-family: sans-serif;
}

#canvas {
    width: 100vw;
    height: 100vh;
    display: block;
}

</style>
</head>

<body>

<div id="ui">
<input type="file" id="file" accept="video/*"><br><br>

X <input type="range" id="x" min="0" max="1280" value="200"><br>
Y <input type="range" id="y" min="0" max="720" value="200"><br>
Size <input type="range" id="size" min="100" max="800" value="300"><br>
Blur <input type="range" id="blur" min="0" max="30" value="0"><br>
Opacity <input type="range" id="opacity" min="0" max="100" value="100"><br>
</div>

<canvas id="canvas"></canvas>

<video id="cam" autoplay playsinline muted style="display:none"></video>
<video id="vid" loop playsinline style="display:none"></video>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const cam = document.getElementById("cam");
const vid = document.getElementById("vid");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

async function startCamera(){
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" } },
        audio: false
    });

    cam.srcObject = stream;
}
startCamera();

// load video from storage
document.getElementById("file").onchange = async (e) => {
    const file = e.target.files[0];
    vid.src = URL.createObjectURL(file);

    try {
        await vid.play(); // important: must come from user gesture
    } catch (err) {
        console.log("Autoplay blocked:", err);
    }
};

function draw(){

    const w = canvas.width;
    const h = canvas.height;

    // split VR view
    const halfW = w / 2;

    [0, halfW].forEach(offsetX => {

        // camera background
        if (cam.readyState >= 2) {
            ctx.drawImage(cam, offsetX, 0, halfW, h);
        }

        // overlay video
        if (vid.readyState >= 2) {

            const ox = parseInt(x.value);
            const oy = parseInt(y.value);
            const size = parseInt(size.value);

            ctx.save();
            ctx.filter = `blur(${blur.value}px)`;
            ctx.globalAlpha = opacity.value / 100;

            ctx.drawImage(vid, offsetX + ox, oy, size, size * 0.6);

            ctx.restore();
        }

    });

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>

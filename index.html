<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fixed VR Camera Overlay</title>

<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: black;
}

#ui {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 10px;
    font-family: sans-serif;
}

canvas {
    width: 100vw;
    height: 100vh;
}
</style>
</head>

<body>

<div id="ui">
<input type="file" id="file" accept="video/*"><br><br>

X <input type="range" id="x" min="0" max="1000" value="200"><br>
Y <input type="range" id="y" min="0" max="800" value="200"><br>
Size <input type="range" id="size" min="50" max="800" value="300"><br>
Blur <input type="range" id="blur" min="0" max="20" value="0"><br>
Opacity <input type="range" id="opacity" min="0" max="100" value="100"><br>
</div>

<canvas id="c"></canvas>

<video id="cam" autoplay playsinline muted></video>
<video id="vid" autoplay loop playsinline muted></video>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const cam = document.getElementById("cam");
const vid = document.getElementById("vid");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

//
// 1. CAMERA (BACK CAMERA FIXED)
//
async function startCam(){
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: { ideal: "environment" }
            },
            audio: false
        });

        cam.srcObject = stream;

        await cam.play();
    } catch (e) {
        console.log("Camera error:", e);
    }
}

startCam();

//
// 2. VIDEO LOAD FIX (IMPORTANT IOS FIXES)
//
document.getElementById("file").onchange = async (e) => {
    const file = e.target.files[0];

    vid.src = URL.createObjectURL(file);
    vid.loop = true;
    vid.muted = false;
    vid.playsInline = true;

    try {
        await vid.play();
    } catch (e) {
        console.log("Video play blocked:", e);
    }
};

//
// 3. DRAW LOOP (ROBUST IOS SAFE)
//
function draw(){

    const w = canvas.width;
    const h = canvas.height;
    const half = w / 2;

    ctx.clearRect(0, 0, w, h);

    const vx = parseInt(x.value);
    const vy = parseInt(y.value);
    const vs = parseInt(size.value);
    const blurVal = blur.value;
    const alpha = opacity.value / 100;

    for (let side = 0; side < 2; side++) {

        const offset = side * half;

        // CAMERA (always draw if ready)
        if (cam.videoWidth > 0) {
            ctx.drawImage(cam, offset, 0, half, h);
        } else {
            // fallback background
            ctx.fillStyle = "black";
            ctx.fillRect(offset, 0, half, h);
        }

        // VIDEO OVERLAY (only if actually playing)
        if (vid.videoWidth > 0 && !vid.paused) {

            ctx.save();
            ctx.filter = `blur(${blurVal}px)`;
            ctx.globalAlpha = alpha;

            ctx.drawImage(
                vid,
                offset + vx,
                vy,
                vs,
                vs * 0.6
            );

            ctx.restore();
        }
    }

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
